<div class="min-h-screen bg-slate-50 flex">
  <aside class="w-64 bg-slate-900 text-white p-6 shadow-xl flex flex-col">
    <div class="text-xl font-bold mb-10 flex items-center gap-2">
      <span class="text-2xl">🍌</span> Banana Exchange
    </div>
    <nav class="space-y-4 flex-1">
      <a class="block p-3 bg-yellow-400 text-slate-900 rounded-xl font-bold">Market</a>
      <a class="block p-3 hover:bg-slate-800 rounded-xl text-slate-400 hover:text-white transition-all">Portfolio</a>
    </nav>
    <button (click)="logout()" class="text-slate-500 hover:text-red-400 text-sm mt-auto">Log Out</button>
  </aside>

  <main class="flex-1 p-10">
    <header class="mb-12">
      <h1 class="text-4xl font-black text-slate-800">Live Market</h1>
      <p class="text-slate-500 mt-2 font-medium">Click a stock to invest your bananas.</p>
    </header>

    @if (stocks(); as stockList) {
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        
        @for (stock of stockList; track stock.symbol) {
          <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:border-yellow-400 hover:shadow-xl transition-all group">
            
            <div class="flex justify-between items-start mb-6">
              <div class="p-3 bg-yellow-50 rounded-2xl text-3xl">🍌</div>
              <span class="text-xs font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full">+{{stock.change}}%</span>
            </div>
            
            <div class="mb-6">
              <h3 class="font-extrabold text-xl text-slate-800">{{stock.name}}</h3>
              <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">{{stock.symbol}}</p>
            </div>
            
            <div class="mb-8">
              <div class="text-3xl font-black text-slate-900">
                {{stock.price}} <span class="text-sm font-medium text-slate-400">🍌</span>
              </div>
            </div>

            <div class="flex flex-col gap-3">
              <div class="flex items-center gap-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Qty</label>
                <input 
                  #qtyInput
                  type="number" 
                  value="1" 
                  min="1"
                  class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 font-bold focus:ring-2 focus:ring-yellow-400 outline-none"
                />
              </div>
              
              <button 
                (click)="purchaseStock(stock.symbol, qtyInput.valueAsNumber)"
                class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-yellow-400 hover:text-slate-900 transition-all shadow-lg">
                BUY {{stock.symbol}}
              </button>
            </div>

          </div>
        }
      </div>
    } @else {
      <div class="flex flex-col items-center justify-center h-64 text-slate-400">
        <div class="animate-spin mb-4 text-4xl">🍌</div>
        <p>Fetching market prices...</p>
      </div>
    }
  </main>
</div>
