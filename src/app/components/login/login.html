<div class="min-h-screen flex items-center justify-center bg-slate-50">
  
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-slate-100">
    
    <div class="text-center mb-8">
      <div class="bg-yellow-400 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
        <span class="text-3xl">🍌</span>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Banana Stock Exchange</h2>
      <p class="text-slate-500 mt-2">Sign in to your trading account</p>
    </div>

    <form class="space-y-6" (ngSubmit)="onSubmit()">
      
      <div>
        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="credentials.username"
          name="username"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all"
          placeholder="e.g. caesar"
        >
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="credentials.password"
          name="password"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-yellow-400 focus:border-yellow-400 outline-none transition-all"
          placeholder="••••••••"
        >
      </div>

      <button 
        type="submit" 
        class="w-full bg-slate-800 text-white font-semibold py-2.5 rounded-lg hover:bg-slate-700 transition-colors shadow-sm"
      >
        Log In
      </button>

    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
      Don't have an account? 
      <a routerLink="/register" class="text-yellow-600 hover:text-yellow-700 font-semibold cursor-pointer">
        Register here
      </a>
    </div>

  </div>
</div>
